# Run the prebuilt image straight from Docker Hub — no local build needed.
#   docker compose -f docker-compose.hub.yml up -d
services:
  torrentflix:
    image: siyamexcom/torrent-movies:latest
    container_name: torrentflix
    ports:
      - "3000:3000"
    environment:
      - TMDB_API_KEY=${TMDB_API_KEY:-}
      - PORT=3000
      # Enables 1337x search via the FlareSolverr container below.
      - FLARESOLVERR_URL=http://flaresolverr:8191
    restart: unless-stopped
    depends_on:
      - flaresolverr
    labels:
      icon: "https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/png/torrent.png"

  # Solves Cloudflare's anti-bot challenge so 1337x results come through.
  # Uses a headless browser, so it's a bit heavy on low-power boards (~250MB RAM).
  flaresolverr:
    # Pinned: v3.3.24 has an ARM Chrome-startup regression. v3.3.21 is stable on arm64.
    image: ghcr.io/flaresolverr/flaresolverr:v3.3.21
    container_name: flaresolverr
    environment:
      - LOG_LEVEL=info
      - TZ=UTC
    restart: unless-stopped
